  - url: https://consumerdatastandardsaustralia.github.io/standards/#get-payees
    type: APIReference
  - url: openapi/people-first-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Consumer-AUTHORIZED Consumer Data Right (CDR) Payees surface, reached through
    the accredited data recipient (ADR) model and secured with OAuth2/OIDC (FAPI). Covers
    Get Payees (/banking/payees) and Get Payee Detail (/banking/payees/{payeeId}),
    returning a consumer's saved payees for a consented account. These endpoints require a
    valid consumer authorization and accredited-ADR credentials, so they are not publicly
    callable. The contract is the shared Data Standards Body CDS Banking API v1.36.0; the
    bank publishes no proprietary OpenAPI for this surface.
