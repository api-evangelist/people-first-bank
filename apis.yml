apis:
- aid: people-first-bank:people-first-bank-cdr-product-reference-data-api
  name: People First Bank CDR Product Reference Data API
  tags:
  - CDR
  - Open Banking
  - Product Reference Data
  - Banking
  - Australia
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.peoplefirstbank.com.au/help-and-support/open-banking/open-banking-for-developers
  baseURL: https://public.openbanking.peoplefirstbank.com.au/cds-au/v1/banking/products
  properties:
  - url: https://www.peoplefirstbank.com.au/help-and-support/open-banking/open-banking-for-developers
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#get-products
    type: APIReference
  - url: openapi/people-first-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Public, unauthenticated Consumer Data Right (CDR) Product Reference Data
    API exposing the bank's banking product catalogue. Confirmed live at
    https://public.openbanking.peoplefirstbank.com.au/cds-au/v1/banking/products (HTTP 200,
    x-v 5) returning a data.products array, with a Get Product Detail endpoint at
    /banking/products/{productId}. The bank's open-banking-for-developers page documents
    exactly these two public endpoints. Conforms to the Data Standards Body Consumer Data
    Standards Get Products / Get Product Detail specification; no bank-proprietary OpenAPI
    is published, so the shared DSB CDS Banking contract (v1.36.0) is harvested here.
- aid: people-first-bank:people-first-bank-cdr-accounts-balances-api
  name: People First Bank CDR Accounts & Balances API
  tags:
  - CDR
  - Open Banking
  - Accounts
  - Balances
  - Banking
  - Australia
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.peoplefirstbank.com.au/help-and-support/open-banking/open-banking-for-developers
  baseURL: https://public.openbanking.peoplefirstbank.com.au/cds-au/v1/banking/accounts
  properties:
  - url: https://www.peoplefirstbank.com.au/help-and-support/open-banking/open-banking-for-developers
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#get-accounts
    type: APIReference
  - url: openapi/people-first-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Consumer-AUTHORIZED Consumer Data Right (CDR) Accounts and Balances surface,
    reached through the accredited data recipient (ADR) model and secured with OAuth2/OIDC
    (FAPI). Covers Get Accounts (/banking/accounts), Get Bulk Balances
    (/banking/accounts/balances), Get Balances For Specific Accounts, Get Account Balance
    (/banking/accounts/{accountId}/balance) and Get Account Detail
    (/banking/accounts/{accountId}). The endpoint is live and gated — an unauthenticated
    GET to /banking/accounts returns HTTP 403 — confirming the bank implements the
    standardized authorized surface. Contract is the shared DSB CDS Banking API v1.36.0;
    People First Bank publishes no bank-proprietary OpenAPI, and ADRs must be accredited
    to obtain a consumer authorization.
- aid: people-first-bank:people-first-bank-cdr-transactions-api
  name: People First Bank CDR Transactions API
  tags:
  - CDR
  - Open Banking
  - Transactions
  - Banking
  - Australia
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.peoplefirstbank.com.au/help-and-support/open-banking/open-banking-for-developers
  baseURL: https://public.openbanking.peoplefirstbank.com.au/cds-au/v1/banking/accounts
  properties:
  - url: https://www.peoplefirstbank.com.au/help-and-support/open-banking/open-banking-for-developers
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#get-transactions-for-account
    type: APIReference
  - url: openapi/people-first-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Consumer-AUTHORIZED Consumer Data Right (CDR) Transactions surface, reached
    through the accredited data recipient (ADR) model and secured with OAuth2/OIDC (FAPI).
    Covers Get Transactions For Account
    (/banking/accounts/{accountId}/transactions) and Get Transaction Detail
    (/banking/accounts/{accountId}/transactions/{transactionId}), returning transaction
    history for a consumer-consented account. These endpoints require a valid consumer
    authorization and accredited-ADR credentials, so they are not publicly callable. The
    contract is the shared Data Standards Body CDS Banking API v1.36.0; the bank publishes
    no proprietary OpenAPI for this surface.
