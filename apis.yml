name: People First Bank
kind: company
description: People First Bank is an Australian customer-owned mutual bank, trading name
  of Heritage and People's Choice Ltd (ABN 11 087 651 125), formed from the 2023 merger
  of Heritage Bank and People's Choice Credit Union and carrying more than 150 years of
  combined mutual heritage. As a B Corp certified, member-owned authorised deposit-taking
  institution (ADI), it offers everyday transaction and savings accounts, home, personal
  and car loans, and insurance across digital channels and a national branch network.
  Under Australia's Consumer Data Right (CDR / open banking), the bank exposes a public,
  unauthenticated Product Reference Data (PRD) API conforming to the Data Standards Body
  Consumer Data Standards; consumer data sharing beyond PRD runs through the accredited
  data recipient model secured with OAuth2/OIDC (FAPI) rather than a general-purpose
  public developer platform.
