    type: APIReference
  - url: openapi/people-first-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Consumer-AUTHORIZED Consumer Data Right (CDR) Direct Debits and Scheduled
    Payments surface, reached through the accredited data recipient (ADR) model and secured
    with OAuth2/OIDC (FAPI). Covers Get Direct Debits For Account, Get Bulk Direct Debits
    (/banking/accounts/direct-debits), Get Direct Debits For Specific Accounts, Get
    Scheduled Payments For Account, Get Bulk Scheduled Payments
    (/banking/payments/scheduled) and Get Scheduled Payments For Specific Accounts. All
    require a consumer authorization and accredited-ADR credentials and are not publicly
    callable. The contract is the shared Data Standards Body CDS Banking API v1.36.0; no
    bank-proprietary OpenAPI is published.
