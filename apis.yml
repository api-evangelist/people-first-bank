apis:
- aid: people-first-bank:people-first-bank-cdr-product-reference-data-api
  name: People First Bank CDR Product Reference Data API
  tags:
  - CDR
  - Open Banking
  - Product Reference Data
  - Banking
  - Australia
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.peoplefirstbank.com.au/help-and-support/open-banking/open-banking-for-developers
  baseURL: https://public.openbanking.peoplefirstbank.com.au/cds-au/v1
  properties:
  - url: https://www.peoplefirstbank.com.au/help-and-support/open-banking/open-banking-for-developers
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#get-products
    type: APIReference
  - url: openapi/people-first-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Public, unauthenticated Consumer Data Right (CDR) Product Reference Data
    API exposing the bank's banking product catalogue. Confirmed live at
    https://public.openbanking.peoplefirstbank.com.au/cds-au/v1/banking/products (HTTP 200,
    x-v 5) returning a data.products array, with a Get Product Detail endpoint at
    /banking/products/{productId}. Conforms to the Data Standards Body Consumer Data
    Standards Get Products specification; no bank-proprietary OpenAPI is published, so the
    shared DSB CDS Banking contract is harvested here.
